# Fly.io configuration for PDFMagic
app = "pdfmagic"
primary_region = "bom" # Mumbai, India

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[env]
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  
  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 850

[[mounts]]
  source = "uploads"
  destination = "/app/uploads"
  initial_size = "10gb"
